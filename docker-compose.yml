services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # MONGO_URL comes from .env (your MongoDB Atlas connection string).
      PORT: '5000'
      NODE_ENV: production
    ports:
      - '5000:5000'

  # Reverse proxy with automatic HTTPS (Let's Encrypt) for the domain.
  # Fetches/renews the TLS cert for kebyu.uz and proxies to the app.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  caddy-data:
  caddy-config:
